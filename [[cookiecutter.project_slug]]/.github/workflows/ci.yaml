name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: All gates
    runs-on: ubuntu-latest
    if: |
      !startsWith(github.event.head_commit.message, 'bump:') &&
      !startsWith(github.head_ref, 'chore/version-bump-')
    steps:
      - uses: actions/checkout@v4

      - name: Restore Dagger engine cache
        id: cache-dagger
        uses: actions/cache@v4
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-v[[ cookiecutter.dagger_version ]]

      - name: Load Dagger engine image
        if: steps.cache-dagger.outputs.cache-hit == 'true'
        run: docker load -i /tmp/dagger-engine.tar

      - name: Run CI pipeline
        uses: dagger/dagger-action@v3
        with:
          version: "[[ cookiecutter.dagger_version ]]"
          cmds: |
            call check --source=.

      - name: Save Dagger engine image
        if: steps.cache-dagger.outputs.cache-hit != 'true'
        run: docker save registry.dagger.io/engine:v[[ cookiecutter.dagger_version ]] -o /tmp/dagger-engine.tar
