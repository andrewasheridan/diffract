# Enforce Conventional Commits format on pull request titles.
#
# Uses pull_request_target so the workflow runs with repo permissions even for
# forks. Only pull-requests: read is needed — no write access required.

name: PR title

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.pull_request.head.ref, 'chore/version-bump-')"
    permissions:
      pull-requests: read

    steps:
      - name: Validate conventional commit format
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Diffract From Source
        run: pip install .

      - name: Validate PR title type matches API change
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s' "$PR_TITLE" > /tmp/pr-title.txt
          diffract \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            --validate-msg-file /tmp/pr-title.txt
