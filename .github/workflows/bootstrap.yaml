name: Bootstrap

on:
  push:

# Prevent concurrent bootstraps. Do NOT cancel in-progress — a half-run bootstrap
# would leave the repo in an inconsistent state.
concurrency:
  group: bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap repo
    runs-on: ubuntu-latest
    # Never run on the template repo itself.
    if: github.repository != 'andrewasheridan/namespaced-template'
    permissions:
      contents: write
      workflows: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install cookiecutter
        run: pip install --quiet cookiecutter

      - name: Patch cookiecutter.json with repo name
        run: |
          repo_name="${{ github.event.repository.name }}"

          # Repo names use dashes; Python package names use underscores.
          package_name="${repo_name//-/_}"

          # Derive a human-readable project name for the README.
          project_name="$(echo "$repo_name" \
            | python3 -c "import sys; print(sys.stdin.read().strip().replace('-', ' ').title())")"

          contents="$(jq \
            --arg pkg  "$package_name" \
            --arg name "$project_name" \
            '.package_name = $pkg | .project_name = $name' \
            cookiecutter.json)"
          echo "$contents" > cookiecutter.json

      - name: Run cookiecutter
        run: cookiecutter . --no-input --output-dir cookiecutter-output

      - name: Replace repo contents
        shell: bash
        run: |
          # Remove everything except .git and the generated output.
          find . -maxdepth 1 -mindepth 1 \
            ! -name '.git' \
            ! -name 'cookiecutter-output' \
            -exec rm -rf {} +

          # Move the generated project files into the repo root.
          rsync -a cookiecutter-output/*/ .
          rm -rf cookiecutter-output

      - name: Push clean initial commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git checkout --orphan bootstrap-branch
          git add .
          git commit -m "chore: initial project scaffold"
          git push origin bootstrap-branch:main --force
