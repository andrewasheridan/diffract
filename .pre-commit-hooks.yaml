# Pre-commit hook definitions for sheridan-diffract.
#
# To use these hooks in another project, add the following to your
# .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/sheridan/diffract
#       rev: v<VERSION>
#       hooks:
#         - id: diffract-validate

- id: diffract-validate
  name: diffract (validate commit message type)
  description: >
    Validates that the conventional commit type in the commit message matches
    the API change diffract detects. Exits 0 on match or unrecognised type;
    exits 1 on mismatch. Non-conventional commits (docs:, chore:, etc.) are
    never blocked. Configure the source directory via diffract.toml or
    pyproject.toml [tool.diffract] rather than hook args.
  language: python
  entry: diffract --validate-msg-file
  pass_filenames: true
  stages: [commit-msg]
